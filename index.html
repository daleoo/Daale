<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dale's Creative Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #07659C;
      color: #f4f4f4;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    h1, h2 {
      font-family: 'Quicksand', sans-serif;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
      background: linear-gradient(135deg, #2c2f3a, #3a3f52);
    }

    .btn {
      background: #63C1F8;
      color: #000;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      margin: 10px;
      display: inline-block;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: #2a2d3a;
      padding: 20px;
      border-radius: 15px;
      margin: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    iframe {
      width: 100%;
      height: 300px;
      border-radius: 12px;
    }

    footer {
      text-align: center;
      padding: 40px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <h2>Dale</h2>
  <div>
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </div>
</header>

<section class="hero">
  <h1>Video Editing • Design • Gaming</h1>
  <p>I create engaging edits and clean visuals with personality!</p>

  <a class="btn" href="#work">View Work</a>
  <a class="btn" href="https://ko-fi.com/daale">Support Me!</a>
</section>

<section id="work" class="section">
  <h2>My Work</h2>

  <div class="card">
    <iframe 
      width="560"
      height="315"
      src="https://www.youtube.com/embed/Zy9XDzRRU0s?si=hLrt0m4qjNgRGs01"
      title="YouTube video player 1" 
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen></iframe>
  </div>

  <div class="card">
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/DhkgV5g6LsY?si=7WnoHoFVpUpBCHoc"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
  </div>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <p>Email: dalesmailboxx@gmail.com</p>
  <p>Discord: @.daale</p>
  <iframe id='kofiframe' src='https://ko-fi.com/daale/?hidefeed=true&widget=true&embed=true&preview=true' style='border:none;width:100%;padding:4px;background:#f9f9f9;' height='712' title='daale'></iframe>
</section>

<footer>
  <p>© 2026 Dale</p>
</footer>

</body>
</html>
