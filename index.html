<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
    <style>
        /* CSS Variables */
        :root {
            --primary-dark: #1a1f2e;
            --secondary-bright-blue: #27a9f5;
            --accent-sky-blue: #63c1f8;
            --text-color: white;
        }
        body {
            background-color: var(--primary-dark);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--primary-dark);
            padding: 20px;
            text-align: center;
        }
        .hero {
            height: 300px;
            background-color: var(--secondary-bright-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }
        button {
            background-color: var(--secondary-bright-blue);
            color: var(--text-color);
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: var(--accent-sky-blue);
        }
        .card {
            background-color: var(--primary-dark);
            border: 1px solid var(--secondary-bright-blue);
            border-radius: 10px;
            margin: 20px;
            padding: 15px;
        }
        .contact {
            background-color: var(--primary-dark);
            padding: 20px;
            text-align: center;
        }
        footer {
            background-color: var(--primary-dark);
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Website Title</h1>
    </header>
    <div class="hero">
        <h2>Welcome to Our Website</h2>
    </div>
    <button>Click Me</button>
    <div class="card">
        <h3>Card Title</h3>
        <p>Some text within a card.</p>
    </div>
    <div class="contact">
        <h4>Contact Us</h4>
        <p>Send us a message!</p>
    </div>
    <footer>
        <p>&copy; 2026 Company Name</p>
    </footer>
</body>
</html>
