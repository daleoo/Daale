<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dale's Creative Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #8FD3FA;
      color: #032C44;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: #63C1F8;
      backdrop-filter: blur(10px);
    }

    h1, h2 {
      font-family: 'Quicksand', sans-serif;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
      background: linear-gradient(180deg, #63C1F8, #27A9F5, #8fd3fa);
    }

    .btn {
      background: #0982C8;
      color: #000;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      margin: 10px;
      display: inline-block;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* Updated Flexbox Container */
    #work {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap; 
      padding: 60px 20px;
      max-width: 1200px;
      margin: auto;
    }

    .section-title {
      width: 100%;
      text-align: left;
      margin-bottom: 20px;
    }

    /* Updated Card Style */
    .card {
      flex: 1;
      min-width: 300px;
      background: #2a2d3a;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* Responsive Iframe */
    iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      border-radius: 8px;
      display: block;
      border: none;
    }

    footer {
      text-align: center;
      padding: 40px;
      opacity: 0.7;
    }

    .contact-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 40px;
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .contact-info {
      flex: 1;
    }

    .ko-fi-widget {
      width: 50%;
      height: 712px;
      border-radius: 12px;
      background: #f9f9f9;
    }
  </style>
</head>

<body>

<header>
  <h2>daale</h2>
</header>

<section class="hero">
  <h1>Video Editing • Design • Gaming</h1>
  <p>I create engaging edits and clean visuals with personality!</p>
  
  <a class="btn" href="#contact">Contact</a>
  <a class="btn" href="#work">View Work</a>
  <a class="btn" href="https://ko-fi.com/daale">Support Me!</a>
</section>

<section id="work">
  <h2 class="section-title">My Work</h2>
  
  <div class="card">
    <iframe 
      src="https://www.youtube.com/embed/dHsdnvJDztg"
      title="We Scared the Huzz Away…" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
      referrerpolicy="strict-origin-when-cross-origin" 
      allowfullscreen></iframe>  
  </div>
  
  <div class="card">
    <iframe 
      src="https://www.youtube.com/embed/Zy9XDzRRU0s?si=hLrt0m4qjNgRGs01"
      title="YouTube video player 1" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen></iframe>
  </div>

  <div class="card">
    <iframe
      src="https://www.youtube.com/embed/DhkgV5g6LsY?si=7WnoHoFVpUpBCHoc"
      title="YouTube video player 2" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin" 
      allowfullscreen></iframe>
  </div>
</section>

<section id="contact" class="section">
  <div class="contact-container">
    <div class="contact-info">
      <h2>Contact</h2>
      <p>Email: dalesmailboxx@gmail.com</p>
      <p>Discord: @.daale</p>
    </div>
    <iframe id='kofiframe' class='ko-fi-widget' src='https://ko-fi.com/daale/?hidefeed=true&widget=true&embed=true&preview=true' title='daale'></iframe>
  </div>
</section>

<footer>
  <p>© 2026 Daale</p>
</footer>

</body>
</html>
